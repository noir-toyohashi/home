<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEEKLY SCHEDULE | Noir（ノワール）</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; font-family: 'Noto Serif JP', serif; background-color: #0a0a0a; color: #d1d1d1; line-height: 1.8; padding-bottom: 80px; }
        .container { width: 92%; max-width: 900px; margin: 0 auto; padding: 40px 0; }
        a { text-decoration: none; color: #c9a063; }
        
        header { background: #000; padding: 30px 0; text-align: center; border-bottom: 1px solid #444; }
        .shop-name { font-family: 'Cinzel', serif; font-size: 24px; color: #c9a063; letter-spacing: 5px; }

        .section-title { font-family: 'Cinzel', serif; font-size: 20px; color: #c9a063; text-align: center; letter-spacing: 4px; margin-bottom: 40px; }
        .section-title::after { content: ''; display: block; width: 30px; height: 1px; background: #c9a063; margin: 10px auto; }

        /* スケジュール表のスタイル */
        .schedule-table { width: 100%; border-collapse: collapse; background: #111; border: 1px solid #222; font-size: 12px; }
        .schedule-table th, .schedule-table td { border: 1px solid #222; padding: 15px 5px; text-align: center; }
        .schedule-table th { background: #000; color: #c9a063; font-weight: normal; }
        .schedule-table .day { font-size: 10px; color: #888; display: block; }
        
        .name { color: #fff; font-weight: bold; margin-bottom: 5px; display: block; }
        .time { color: #c9a063; font-size: 11px; }

        .back-btn { text-align: center; margin-top: 40px; }
        .back-btn a { font-size: 12px; border-bottom: 1px solid #c9a063; padding-bottom: 5px; }
    </style>
</head>
<body>

<header>
    <div class="shop-name">NOIR</div>
</header>

<div class="container">
    <h3 class="section-title">WEEKLY SCHEDULE</h3>

    <table class="schedule-table">
        <thead>
            <tr>
                <th>3/25<span class="day">水</span></th>
                <th>3/26<span class="day">木</span></th>
                <th>3/27<span class="day">金</span></th>
                <th>3/28<span class="day">土</span></th>
                <th>3/29<span class="day">日</span></th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>
                    <span class="name">あきな</span>
                    <span class="time">10-18</span>
                </td>
                <td>ー</td>
                <td>
                    <span class="name">あきな</span>
                    <span class="time">10-18</span>
                </td>
                <td>
                    <span class="name">あきな</span>
                    <span class="time">12-20</span>
                </td>
                <td>ー</td>
            </tr>
            <tr>
                <td>
                    <span class="name">はるか</span>
                    <span class="time">13-21</span>
                </td>
                <td>
                    <span class="name">はるか</span>
                    <span class="time">13-21</span>
                </td>
                <td>ー</td>
                <td>ー</td>
                <td>
                    <span class="name">はるか</span>
                    <span class="time">10-18</span>
                </td>
            </tr>
        </tbody>
    </table>

    <div class="back-btn">
        <a href="index.html">TOPへ戻る</a>
    </div>
</div>

</body>
</html>
